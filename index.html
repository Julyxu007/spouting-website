<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Fascia & Spouting Repairs NZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Spouting Experts</div>
     <nav>
        <a href="index.html" class="active">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        </nav>
        </header>
    <section class="container contact-section">
        <h2>Get A Free Quote Today</h2>
        <p>Fill out the form below, and we will get back to you as soon as possible.</p>
        
        <form class="quote-form">
            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" required placeholder="021 000 0000">
            </div>
            <div class="form-group">
                <label>Your Location (Suburb/City) *</label>
                <input type="text" required placeholder="e.g., Auckland CBD">
            </div>
            <div class="form-group">
                <label>What do you need help with?</label>
                <textarea rows="4" placeholder="Describe your fascia or spouting problems..."></textarea>
            </div>
            <button type="submit" class="btn btn-submit">Send Request</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Spouting Experts. All Rights Reserved.</p>
    </footer>
</body>
</html>
